name: Update preset catalogs

on:
  push:
    paths:
      - 'ucm_presets/*.ucmpreset'
      - 'community_presets/*.ucmpreset'

jobs:
  update-catalogs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate catalogs from preset files
        run: |
          python3 << 'SCRIPT'
          import json, hashlib, os, glob
          from datetime import datetime, timezone

          def generate_catalog(preset_dir, catalog_path, kind_filter=None):
              # Load existing catalog to preserve SHAs for unchanged files
              existing = {}
              if os.path.exists(catalog_path):
                  try:
                      with open(catalog_path) as f:
                          old_catalog = json.load(f)
                      for p in old_catalog.get("presets", []):
                          existing[p["file"]] = p
                  except:
                      pass

              presets = []
              for path in sorted(glob.glob(f"{preset_dir}/*.ucmpreset")):
                  try:
                      with open(path, "rb") as f:
                          raw_bytes = f.read()

                      data = json.loads(raw_bytes.decode("utf-8"))

                      if kind_filter and data.get("kind") != kind_filter:
                          continue

                      file_name = os.path.basename(path)
                      file_id = os.path.splitext(file_name)[0].lower().replace(" ", "-")

                      sha = hashlib.sha256(raw_bytes).hexdigest()
                      size = len(raw_bytes)

                      # If file exists in old catalog with same SHA, keep old entry
                      # This prevents false update notifications when other files change
                      old_entry = existing.get(file_name)
                      if old_entry and old_entry.get("sha256") == sha:
                          presets.append(old_entry)
                          continue

                      name = data.get("name", file_name)
                      author = data.get("author", "")
                      desc = data.get("description", "")
                      if len(desc) > 300:
                          desc = desc[:297] + "..."
                      url = data.get("url", "")
                      version = data.get("version", "")
                      tags = data.get("tags", [])

                      presets.append({
                          "id": file_id,
                          "file": file_name,
                          "name": name,
                          "author": author,
                          "description": desc,
                          "url": url,
                          "version": version,
                          "sha256": sha,
                          "size_bytes": size,
                          "tags": tags,
                      })
                  except Exception as e:
                      print(f"Skipping {path}: {e}")

              catalog = {
                  "catalog_version": 1,
                  "updated_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                  "presets": presets,
              }

              with open(catalog_path, "w", encoding="utf-8") as f:
                  json.dump(catalog, f, indent=2, ensure_ascii=False)
                  f.write("\n")

              print(f"{catalog_path}: {len(presets)} presets")

          # UCM presets (style definitions only)
          if os.path.isdir("ucm_presets"):
              generate_catalog("ucm_presets", "ucm_presets/catalog.json", kind_filter="style")

          # Community presets (all presets)
          if os.path.isdir("community_presets"):
              generate_catalog("community_presets", "community_presets/catalog.json")
          SCRIPT

      - name: Commit updated catalogs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ucm_presets/catalog.json community_presets/catalog.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to catalogs"
          else
            git commit -m "Auto-update preset catalogs [skip ci]"
            git push
          fi
